name: Autograding Tests
'on':
- push
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: CString Suite Tests
      id: cstring-suite-tests
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: CString Suite Tests
        setup-command: ''
        command: mvn test
        timeout: 10
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        CSTRING-SUITE-TESTS_RESULTS: "${{steps.cstring-suite-tests.outputs.result}}"
      with:
        runners: cstring-suite-tests
